<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EzLander Live Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4ed;
      --text-dim: #7a7f92;
      --accent: #6c8aff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- Header / Status Bar ---- */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-group {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      flex-wrap: wrap;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.idle       { background: var(--green); }
    .status-dot.building   { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.capturing  { background: var(--accent); animation: pulse 1.5s infinite; }
    .status-dot.error      { background: var(--red); }
    .status-dot.connected  { background: var(--green); }
    .status-dot.disconnected { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .meta {
      font-size: 12px;
      color: var(--text-dim);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    button.secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ---- Main Layout ---- */
    .main {
      display: flex;
      gap: 0;
      min-height: calc(100vh - 53px);
    }

    /* ---- Preview Panel ---- */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      position: relative;
    }

    .preview-controls {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-label {
      font-size: 13px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .screenshot-frame {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      position: relative;
    }

    .screenshot-frame img {
      display: block;
      width: 400px;
      height: 500px;
      object-fit: contain;
      background: #000;
      transition: width 0.3s, height 0.3s;
    }

    .screenshot-frame img.retina {
      width: 800px;
      height: 1000px;
    }

    .screenshot-frame .placeholder {
      width: 400px;
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 14px;
      background: var(--surface);
    }

    /* ---- Log Panel ---- */
    .log-panel {
      width: 420px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .log-header {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 11.5px;
      line-height: 1.7;
    }

    .log-line {
      padding: 1px 16px;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-dim);
    }

    .log-line:hover {
      background: rgba(255,255,255,0.03);
    }

    /* Scrollbar */
    .log-body::-webkit-scrollbar { width: 6px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- Responsive ---- */
    @media (max-width: 900px) {
      .main { flex-direction: column; }
      .log-panel { width: 100%; height: 300px; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- Header / Status Bar -->
  <div class="header">
    <h1>EzLander Preview</h1>
    <div class="status-group">
      <span class="status-badge">
        <span class="status-dot idle" id="statusDot"></span>
        <span id="statusText">Idle</span>
      </span>
      <span class="status-badge">
        <span class="status-dot connected" id="wsDot"></span>
        <span id="wsText">Connected</span>
      </span>
      <span class="meta" id="lastUpdate">--</span>
    </div>
    <div class="actions">
      <button id="btnRebuild" onclick="forceRebuild()">Force Rebuild</button>
      <button id="btnCapture" class="secondary" onclick="captureNow()">Capture Now</button>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main">
    <!-- Preview -->
    <div class="preview-panel">
      <div class="preview-controls">
        <label class="toggle-label">
          <input type="checkbox" id="retinaToggle" onchange="toggleRetina()" />
          Full Size (2x Retina)
        </label>
      </div>
      <div class="screenshot-frame">
        <img id="screenshotImg" src="/screenshots/latest.png" alt="App Preview"
             onerror="this.style.display='none'; document.getElementById('pholder').style.display='flex';"
             onload="this.style.display='block'; document.getElementById('pholder').style.display='none';" />
        <div class="placeholder" id="pholder">
          No screenshot yet. Waiting for first build...
        </div>
      </div>
    </div>

    <!-- Log -->
    <div class="log-panel">
      <div class="log-header">
        <span>Activity Log</span>
        <button class="secondary" style="padding:3px 8px;font-size:11px;" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>

  <script>
    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let ws = null;
    let reconnectTimer = null;
    const logBody = document.getElementById('logBody');

    // -----------------------------------------------------------------------
    // WebSocket
    // -----------------------------------------------------------------------
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        setWsStatus(true);
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      ws.onclose = () => {
        setWsStatus(false);
        scheduleReconnect();
      };

      ws.onerror = () => {
        ws.close();
      };

      ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);
        handleMessage(data);
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, 2000);
    }

    function handleMessage(data) {
      switch (data.type) {
        case 'init':
          setBuildStatus(data.status);
          setLastUpdate(data.lastUpdate);
          if (data.log) {
            data.log.forEach(addLogLine);
          }
          refreshScreenshot();
          break;
        case 'status':
          setBuildStatus(data.status);
          setLastUpdate(data.lastUpdate);
          break;
        case 'screenshot':
          refreshScreenshot();
          setLastUpdate(data.ts);
          break;
        case 'log':
          addLogLine(data.entry);
          break;
      }
    }

    // -----------------------------------------------------------------------
    // UI Updates
    // -----------------------------------------------------------------------
    function setBuildStatus(status) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.className = 'status-dot ' + status;
      const labels = { idle: 'Idle', building: 'Building...', capturing: 'Capturing...', error: 'Error' };
      text.textContent = labels[status] || status;

      document.getElementById('btnRebuild').disabled = (status === 'building');
    }

    function setWsStatus(connected) {
      const dot = document.getElementById('wsDot');
      const text = document.getElementById('wsText');
      dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
      text.textContent = connected ? 'Connected' : 'Disconnected';
    }

    function setLastUpdate(ts) {
      if (!ts) return;
      const d = new Date(ts);
      document.getElementById('lastUpdate').textContent = 'Last update: ' + d.toLocaleTimeString();
    }

    function refreshScreenshot() {
      const img = document.getElementById('screenshotImg');
      img.src = '/screenshots/latest.png?t=' + Date.now();
    }

    function addLogLine(text) {
      const div = document.createElement('div');
      div.className = 'log-line';
      div.textContent = text;
      logBody.appendChild(div);
      // Keep max 50 visible
      while (logBody.children.length > 50) {
        logBody.removeChild(logBody.firstChild);
      }
      logBody.scrollTop = logBody.scrollHeight;
    }

    function clearLog() {
      logBody.innerHTML = '';
    }

    function toggleRetina() {
      const img = document.getElementById('screenshotImg');
      const checked = document.getElementById('retinaToggle').checked;
      img.classList.toggle('retina', checked);
    }

    // -----------------------------------------------------------------------
    // Actions
    // -----------------------------------------------------------------------
    function forceRebuild() {
      fetch('/api/rebuild', { method: 'POST' });
    }

    function captureNow() {
      fetch('/api/capture', { method: 'POST' });
    }

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    connect();
  </script>
</body>
</html>
